name: generate animation

on:
  # executa automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *" 
  
  # permite executar manualmente a qualquer momento
  workflow_dispatch:
  
  # executa a cada push na branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # gera o jogo da cobrinha com cores personalizadas (Laranja)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff7b00&color_dots=#161b22,#4c2b00,#8c4d00,#cc7000,#ff7b00
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff7b00&color_dots=#161b22,#4c2b00,#8c4d00,#cc7000,#ff7b00
          
      # envia o conteúdo de <build_dir> para a branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
